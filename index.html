<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
    #bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:0.55;}
    .side-panel{width:220px!important;}
    .panel-visits-row{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(0,255,204,0.07),rgba(0,80,180,0.05));border:1px solid rgba(0,255,204,0.18);border-radius:10px;padding:7px 10px;box-shadow:0 0 10px rgba(0,255,204,0.05),inset 0 1px 0 rgba(255,255,255,0.04);max-width:fit-content;}
    .eye-wrap{width:32px;height:20px;flex-shrink:0;}
    .eye-svg{width:32px;height:20px;}
    .panel-visits-label{font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:rgba(0,255,204,0.5);font-weight:700;line-height:1;}
    .panel-visits-count{font-size:0.95rem;font-weight:800;color:#fff;line-height:1.15;text-shadow:0 0 8px rgba(0,255,204,0.35);}

    .cat-buttons{display:flex;flex-direction:column;gap:7px;padding:0 6px;}
    .cat-btn{
        display:flex;align-items:center;gap:10px;
        padding:8px 14px;border-radius:11px;cursor:pointer;
        background:rgba(255,255,255,0.03);
        border:1px solid rgba(255,255,255,0.07);
        color:rgba(255,255,255,0.6);font-size:0.8rem;font-weight:600;
        font-family:'Poppins',sans-serif;
        transition:all 0.22s ease;text-align:left;width:100%;
    }
    .cat-btn:hover{background:rgba(0,255,204,0.08);border-color:rgba(0,255,204,0.28);color:#fff;}
    .cat-btn.active{background:linear-gradient(135deg,rgba(0,255,204,0.13),rgba(0,120,200,0.08));border-color:rgba(0,255,204,0.45);color:#00ffcc;box-shadow:0 0 14px rgba(0,255,204,0.1),inset 0 1px 0 rgba(0,255,204,0.08);}
    .cat-icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);}
    .cat-btn.active .cat-icon-wrap{background:rgba(0,255,204,0.1);border-color:rgba(0,255,204,0.3);}
    .cat-icon-wrap svg{width:15px;height:15px;fill:rgba(255,255,255,0.5);}
    .cat-btn.active .cat-icon-wrap svg{fill:#00ffcc;}
    .cat-name{flex:1;letter-spacing:0.3px;}
    .cat-count{font-size:0.62rem;color:rgba(255,255,255,0.25);font-weight:700;background:rgba(255,255,255,0.06);padding:2px 7px;border-radius:20px;}
    .cat-btn.active .cat-count{color:rgba(0,255,204,0.8);background:rgba(0,255,204,0.1);}
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <script>
    (function(){
        const canvas=document.getElementById('bgCanvas');
        const ctx=canvas.getContext('2d');
        const tokens=['loadstring','game:HttpGet','function','local','end','true','false','wait','pcall','pairs','ipairs','tostring','tonumber','print','return','if','then','else','repeat','until','while','do','break','nil','not','and','or','math.random','string.format','table.insert','Instance.new','workspace','Players','RunService','RemoteEvent','script','getfenv','setfenv','rawget','rawset','Vector3','CFrame','Color3','UDim2','TweenService','HttpService',':#','::','{}','[]','()', '--[[',']]','0xFF','\\x','\\u','base64','AES','XOR','SHA','encrypt','decrypt','obfusc','inject','hook','bypass','anti','detect','farm','auto','kill','esp','aimbot','speed','fly','noclip','inf','loop'];
        let cols, drops, fontSize=13;
        function resize(){
            canvas.width=window.innerWidth;
            canvas.height=window.innerHeight;
            cols=Math.floor(canvas.width/fontSize);
            drops=new Array(cols).fill(0).map(()=>-Math.random()*80);
        }
        resize();
        window.addEventListener('resize',resize);
        function draw(){
            ctx.fillStyle='rgba(0,4,20,0.18)';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            for(let i=0;i<cols;i++){
                const tok=tokens[Math.floor(Math.random()*tokens.length)];
                const char=tok[Math.floor(Math.random()*tok.length)];
                const y=drops[i]*fontSize;
                const head=(drops[i]-1)*fontSize;
                // head char — bright white/cyan
                ctx.font=`bold ${fontSize}px monospace`;
                ctx.fillStyle='rgba(220,255,250,0.95)';
                ctx.fillText(char,i*fontSize,head);
                // trail
                const green=Math.random()>0.7;
                if(green){ctx.fillStyle=`rgba(0,255,${150+Math.random()*105},${0.1+Math.random()*0.4})`;}
                else{ctx.fillStyle=`rgba(0,${180+Math.random()*75},${200+Math.random()*55},${0.08+Math.random()*0.25})`;}
                ctx.font=`${fontSize}px monospace`;
                ctx.fillText(char,i*fontSize,y);
                if(y>canvas.height&&Math.random()>0.975) drops[i]=0;
                drops[i]+=0.4+Math.random()*0.3;
            }
        }
        setInterval(draw,45);
    })();
    </script>

    <script>
    function toggleMenu(){
        const panel=document.getElementById('sidePanel');
        const overlay=document.getElementById('panelOverlay');
        const btn=document.querySelector('.menu-hamburger');
        const isOpen=panel.classList.contains('open');
        panel.classList.toggle('open',!isOpen);
        overlay.classList.toggle('active',!isOpen);
        btn.classList.toggle('active',!isOpen);
    }
    function closeMenu(){
        document.getElementById('sidePanel').classList.remove('open');
        document.getElementById('panelOverlay').classList.remove('active');
        document.querySelector('.menu-hamburger').classList.remove('active');
    }
    function triggerBlink(){
        const eye=document.getElementById('eyeWrap');
        eye.classList.remove('blink');
        void eye.offsetWidth;
        eye.classList.add('blink');
    }
    function filterCategory(cat,btn){
        document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        if(typeof filterCards==='function'){
            if(cat==='all'){filterCards('');}
            else{
                const map={dragonball:['Dragon Blox Ultimate','Dragon Ball Rage'],accion:['War Machines'],simulador:['Muscle Legends']};
                const names=map[cat]||[];
                if(typeof cards!=='undefined'){
                    cards.forEach(card=>{
                        const g=card.getAttribute('data-game')||'';
                        card.style.display=names.includes(g)?'block':'none';
                    });
                    if(typeof updateCoverflow==='function')updateCoverflow();
                }
            }
        }
        if(typeof closeMenu==='function')closeMenu();
    }
    function animateVisitNum(from,to,duration){
        const el=document.getElementById('visitCount');
        const start=performance.now();
        function step(now){
            const p=Math.min((now-start)/duration,1);
            const ease=1-Math.pow(1-p,4);
            el.textContent=Math.round(from+(to-from)*ease);
            if(p<1)requestAnimationFrame(step);
            else{el.textContent=to;}
        }
        requestAnimationFrame(step);
    }
    </script>
</body>
